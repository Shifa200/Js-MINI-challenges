<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Column Table</h1>
    <div class="range">
       <div>
        <label>Rows</label>
        <input type="range" id="rows" min="1" max="10" value="3" />
       </div>
       <div>
        <label>Columns</label>
        <input type="range" id="columns" min="1" max="10" value="2" />
       </div>
    </div>

    <div id="table">
        <table border = '1'>
            <tbody class = 'table-body'></tbody>
        </table>
    </div>

    <script src="index.js"></script>
</body>
</html>
